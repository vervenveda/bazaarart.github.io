<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Creative Ritual Wheel — Clean (No Editing)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#01101c; --ink:#322b23; --gold:#b89252; --paper:#fffbe8;
    }
    *{box-sizing:border-box}
    html,body{margin:0}
    body{
      background:var(--bg); color:var(--ink);
      font-family:'Cormorant Garamond', serif;
      min-height:100vh; display:flex; flex-direction:column; align-items:center;
    }
    .wrap{
      margin:34px auto 0; background:#ffffff;
      border-radius:21px; box-shadow:0 7px 30px #e9dcc655;
      max-width:380px; width:96vw; padding:26px 13px 18px;
      display:flex; flex-direction:column; align-items:center;
    }
    h1{
      font-family:'Cinzel', serif; letter-spacing:1.1px; color:#ad7c28;
      font-size:1.65em; margin:0 0 8px; text-align:center;
    }
    .desc{font-size:1.08em; color:#7a5a28; margin-bottom:14px; text-align:center}
    .wheel-outer{position:relative; width:260px; height:260px; margin:6px auto 12px}
    #wheel{
      width:100%; height:100%; display:block; border-radius:50%;
      background:#f9efd2; border:3.5px solid var(--gold); box-shadow:0 3px 18px #d9b87825;
      cursor:pointer;
    }
    .pointer{
      position:absolute; left:50%; top:-16px; transform:translateX(-50%);
      width:0; height:0; border-left:17px solid transparent; border-right:17px solid transparent;
      border-bottom:21px solid var(--gold); z-index:2;
    }
    .result{
      min-height:56px; text-align:center; font-size:1.12em; color:#85692e;
    }
    .buttons{
      display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin:6px 0 2px;
    }
    button{
      background:#f2e0b1; color:#7a5a28; border:none; border-radius:9px;
      font-size:1em; padding:7px 14px; cursor:pointer; box-shadow:0 2px 6px #baa06015;
    }
    button:hover{background:#e8d9aa}
    .copyright{
      font-size:.9em; color:#b89252; opacity:.77; margin:13px auto 18px;
    }

    /* Ritual Log Panel */
    .log-panel{
      margin-top:10px;
      width:100%;
      max-width:340px;
      background:#f9efd2;
      border-radius:12px;
      padding:8px 10px 10px;
      border:1px solid rgba(184,146,82,0.45);
      font-size:0.98em;
      color:#7a5a28;
    }
    .log-title{
      font-weight:600;
      font-size:1.02em;
      margin-bottom:4px;
      text-align:center;
    }
    .log-body{
      font-size:0.96em;
      line-height:1.4;
    }

    @media (max-width:500px){
      .wrap{margin:2vw 0; padding:8vw 2vw}
      .wheel-outer{width:92vw; height:92vw; max-width:360px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Creative Inspiration Wheel</h1>
    <div class="desc">Tap to spin. After it lands, your activity + a pep-talk appears below.</div>

    <div class="wheel-outer">
      <div class="pointer"></div>
      <canvas
        id="wheel"
        width="520"
        height="520"
        title="Tap to spin!"
        role="button"
        tabindex="0"
        aria-label="Creative Ritual Wheel. Press Enter or Space to spin."
      ></canvas>
    </div>

    <div class="result" id="result">Spin the wheel to begin.</div>
    <div class="buttons">
      <button id="spinBtn">🎡 Spin</button>
      <button id="rerollBtn" disabled>🔄 Reroll Comment</button>
      <button id="favoriteBtn" disabled>⭐ Favorite</button>
    </div>

    <div class="log-panel" id="logPanel">
      <div class="log-title">Inspiration  Log</div>
      <div class="log-body" id="logBody">
        Spin the wheel to begin.
      </div>
    </div>
  </div>

  <div class="copyright">© 2025 Verve N Veda · Sovereign and Free</div>

<script>
/* ---------- Locked Rituals (no editing) ---------- */
const RITUALS = [
  "Write a 3-line haiku about today",
  "Walk barefoot for 2 minutes",
  "Draw something from memory",
  "Send gratitude to a friend (text or call)",
  "Light a candle & reflect on your week",
  "One line to your future self",
  "Sketch your dream for 3 minutes",
  "Dance for 1 song (nobody watching!)",
  "Read aloud a favorite poem",
  "List 3 things you're grateful for",
  "Listen to the rain, eyes closed",
  "Doodle what freedom feels like",
  "Take 10 deep breaths with a slow count",
  "Step outside and name 5 colors you see",
  "Write one sentence that begins 'I choose...'",
  "Make a tiny collage from scrap paper",
  "Hum a lullaby or favorite tune",
  "Stretch like a cat for 60 seconds",
  "Write a six-word story about today",
  "Photograph one small beautiful thing",
  "Declutter one pocket, drawer, or browser tab",
  "Sip a glass of water mindfully",
  "Write a kind note to yourself",
  "Free-write for 3 minutes, no edits",
  "Sketch your hand without looking (30 seconds)",
  "Write a micro-prayer or blessing",
  "Learn one new word and use it in a line",
  "Trace a leaf or a shadow you see",
  "Do a 2-minute wall sit or plank",
  "Lightly tidy a surface and admire it",
  "Describe one object with all five senses",
  "Write a tiny thank-you to your body",
  "Read one page from a book you love",
  "Write a postcard to your future self (keep it)",
  "Take a 5-minute technology pause",
  "Walk while counting 100 slow steps",
  "List 5 gentle goals for this week",
  "Draw a map of a place you love",
  "Write a metaphor for your mood",
  "Try box breathing: 4-4-4-4 for 1 minute",
  "Copy one line of poetry by hand",
  "Title a 10-song 'joy playlist'",
  "Write 3 'I am...' affirmations",
  "Look up and sketch the sky",
  "Write a tiny scene with two characters",
  "Arrange 5 objects into a mini still life",
  "Practice one minute of silence",
  "Write one thing you will release today",
  "Create a two-line rhyme with your name",
  "Do a random act of kindness today"
];

/* Pep-talk comments (50) */
const COMMENTS = [
  "Make it tiny and winnable — momentum loves small starts.",
  "Set a 3–5 minute timer and begin softly.",
  "Breathe once, drop your shoulders, then play.",
  "No perfection today — only curiosity.",
  "Create a souvenir of this moment (even a scribble counts).",
  "Your future self will thank you for this little spark.",
  "Add music or sunlight to make it inviting.",
  "You only need to show up for one gentle round.",
  "Start messy, refine later.",
  "One minute counts — begin now.",
  "Progress beats perfection.",
  "Lower the bar; raise your consistency.",
  "Make the first step laughably small.",
  "Celebrate a micro-win when you finish.",
  "Turn distractions off for five minutes.",
  "Choose the easiest next action.",
  "If it feels hard, shrink the task.",
  "Write badly on purpose, then keep going.",
  "Curiosity first; judgment later.",
  "Stand, stretch, sip water, start.",
  "You don’t need motivation — just a tiny motion.",
  "Done is a gift to tomorrow’s you.",
  "Make it playful; let it be fun.",
  "Focus on one thing only.",
  "Reduce, simplify, start.",
  "Put the phone in another room.",
  "Set a cozy scene you want to return to.",
  "Try the two-minute rule: start for 120 seconds.",
  "One percent better is enough.",
  "Stack this ritual onto something you already do.",
  "Name your why in one sentence.",
  "If you stumble, resume — no guilt.",
  "Small daily beats rare heroic.",
  "Trust the warm-up; brilliance comes later.",
  "Leave a breadcrumb note for your next session.",
  "Turn anxiety into action: tiny step now.",
  "Breathe in calm, exhale pressure.",
  "Replace “should” with “could.”",
  "Make the outcome optional, the start non-negotiable.",
  "Permission to make drafts, not masterpieces.",
  "Close extra tabs; open one.",
  "Write the worst version first.",
  "Ask, “What would help future me?”",
  "Progress hides in repetition.",
  "Choose kindness toward yourself.",
  "Keep the scope narrow; depth will follow.",
  "When stuck, change posture or place.",
  "A short session beats a skipped session.",
  "End on a win; stop before you’re drained.",
  "Show up, even briefly — that’s the victory."
];

/* ---------- LocalStorage State (per day) ---------- */
const STORAGE_KEY = "creativeRitualWheel_state_v1";

function getTodayKey(){
  const d = new Date();
  return d.toISOString().slice(0,10); // YYYY-MM-DD
}

let wheelState = {
  date: getTodayKey(),
  lastIndex: null,
  spinsToday: 0,
  ritualsToday: [],
  favorites: []
};

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return;
    const parsed = JSON.parse(raw);
    if(!parsed || typeof parsed !== "object") return;

    const today = getTodayKey();
    const favorites = Array.isArray(parsed.favorites) ? parsed.favorites : [];
    if(parsed.date === today){
      wheelState = {
        date: today,
        lastIndex: (typeof parsed.lastIndex === "number") ? parsed.lastIndex : null,
        spinsToday: Number.isFinite(parsed.spinsToday) ? parsed.spinsToday : 0,
        ritualsToday: Array.isArray(parsed.ritualsToday) ? parsed.ritualsToday : [],
        favorites
      };
    }else{
      // New day: reset daily counters, keep favorites
      wheelState = {
        date: today,
        lastIndex: null,
        spinsToday: 0,
        ritualsToday: [],
        favorites
      };
    }
  }catch(e){
    console.warn("Could not load ritual wheel state", e);
  }
}

function saveState(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(wheelState));
  }catch(e){
    console.warn("Could not save ritual wheel state", e);
  }
}

loadState();

/* ---------- DOM & Canvas ---------- */
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
let angle = 0, spinning = false, lastIndex = null;

const result = document.getElementById("result");
const spinBtn = document.getElementById("spinBtn");
const rerollBtn = document.getElementById("rerollBtn");
const favoriteBtn = document.getElementById("favoriteBtn");
const logBody = document.getElementById("logBody");

/* Accessible keyboard control */
canvas.addEventListener("keydown", (e) => {
  if(e.key === "Enter" || e.key === " "){
    e.preventDefault();
    spin();
  }
});

function palette(n){
  const base = [
    "#d9b878","#e3c27e","#f7f3ea","#e8d5a4","#c3a45d",
    "#b89252","#f2e0b1","#baa060","#ad7c28","#f7eac5"
  ];
  return Array.from({length:n}, (_,i)=>base[i%base.length]);
}

function drawWheel(){
  const N = RITUALS.length;
  const colors = palette(N);
  const W = canvas.width, H = canvas.height, R = Math.min(W,H)/2 - 8;
  ctx.clearRect(0,0,W,H);
  for(let i=0;i<N;i++){
    const a0 = angle + i*(2*Math.PI/N);
    const a1 = angle + (i+1)*(2*Math.PI/N);
    ctx.beginPath();
    ctx.moveTo(W/2,H/2);
    ctx.arc(W/2,H/2,R,a0,a1,false);
    ctx.closePath();
    ctx.fillStyle = colors[i];
    ctx.fill();
  }
}
drawWheel();

/* Which slice is at the top pointer */
function sliceAtPointer(){
  const N = RITUALS.length;
  const slice = 2*Math.PI/N;
  const pointer = -Math.PI/2; // top
  let rel = pointer - angle;
  rel = (rel % (2*Math.PI) + 2*Math.PI) % (2*Math.PI);
  return Math.floor((rel + 1e-6) / slice) % N;
}

function randomComment(){
  return COMMENTS[Math.floor(Math.random()*COMMENTS.length)];
}

/* ---------- Ritual Log UI ---------- */
function updateLogPanel(){
  if(!logBody) return;
  const spins = wheelState.spinsToday || 0;
  const todayList = Array.isArray(wheelState.ritualsToday) ? wheelState.ritualsToday.slice() : [];
  const uniqueToday = todayList.filter((v,i,a)=>a.indexOf(v)===i);
  const favorites = Array.isArray(wheelState.favorites) ? wheelState.favorites.slice() : [];
  const uniqueFavs = favorites.filter((v,i,a)=>a.indexOf(v)===i);

  if(spins === 0){
    logBody.textContent = "No rituals yet today. Spin the wheel to begin.";
    return;
  }

  let html = "";
  html += `<div><strong>Spins today:</strong> ${spins}</div>`;

  if(uniqueToday.length){
    const labels = uniqueToday
      .map(i => RITUALS[i])
      .filter(Boolean);
    if(labels.length){
      html += `<div style="margin-top:4px;"><strong>Today’s rituals:</strong><br>${labels.map(l => "• " + l).join("<br>")}</div>`;
    }
  }

  if(uniqueFavs.length){
    const favLabels = uniqueFavs
      .map(i => RITUALS[i])
      .filter(Boolean);
    if(favLabels.length){
      html += `<div style="margin-top:6px;"><strong>Favorites:</strong><br>${favLabels.map(l => "★ " + l).join("<br>")}</div>`;
    }
  }

  logBody.innerHTML = html;
}

/* ---------- Result Rendering ---------- */
function renderResultForIndex(idx, rerollOnly){
  if(idx == null || idx < 0 || idx >= RITUALS.length) return;
  const ritual = RITUALS[idx];
  result.innerHTML =
    `<b>Your Ritual:</b><br>${ritual}` +
    `<br><em style="color:#7a5a28;display:block;margin-top:6px">💡 ${randomComment()}</em>`;

  rerollBtn.disabled = false;
  if(favoriteBtn) favoriteBtn.disabled = false;
  lastIndex = idx;

  if(!rerollOnly){
    wheelState.lastIndex = idx;
    wheelState.spinsToday = (wheelState.spinsToday || 0) + 1;
    if(!Array.isArray(wheelState.ritualsToday)) wheelState.ritualsToday = [];
    wheelState.ritualsToday.push(idx);
    saveState();
    updateLogPanel();
  }
}

/* ---------- Spin Logic ---------- */
function spin(){
  if(spinning) return;
  spinning = true;
  rerollBtn.disabled = true;
  if(favoriteBtn) favoriteBtn.disabled = true;
  result.textContent = "Spinning...";

  let v = 0.32 + Math.random()*0.22;   // initial speed
  const dec = 0.992 + Math.random()*0.002;
  let slowGate = 14 + Math.floor(Math.random()*5); // min turns while slow

  function step(){
    angle += v;
    v *= dec;
    drawWheel();
    if(v > 0.003 || slowGate > 0){
      if(v < 0.015) slowGate--;
      requestAnimationFrame(step);
    }else{
      spinning = false;
      const idx = sliceAtPointer();
      renderResultForIndex(idx, false);
    }
  }
  step();
}

/* ---------- Controls ---------- */
canvas.addEventListener("click", spin);
spinBtn.addEventListener("click", spin);

rerollBtn.addEventListener("click", ()=>{
  if(lastIndex == null) return;
  // Reroll only changes the pep talk, not the ritual or log
  renderResultForIndex(lastIndex, true);
});

if(favoriteBtn){
  favoriteBtn.addEventListener("click", ()=>{
    if(lastIndex == null) return;
    if(!Array.isArray(wheelState.favorites)) wheelState.favorites = [];
    if(!wheelState.favorites.includes(lastIndex)){
      wheelState.favorites.push(lastIndex);
      saveState();
      updateLogPanel();
    }
  });
}

/* ---------- Initial State Apply ---------- */
updateLogPanel();
if(
  typeof wheelState.lastIndex === "number" &&
  wheelState.lastIndex >= 0 &&
  wheelState.lastIndex < RITUALS.length
){
  lastIndex = wheelState.lastIndex;
  // Show the stored ritual for today, but don't increment counters again
  renderResultForIndex(lastIndex, true);
}
</script>
</body>
</html>
