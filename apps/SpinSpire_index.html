<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SpinSpire™ – Spin for your daily art prompt!</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    html, body {
      height: 100%; margin: 0; padding: 0;
      background: radial-gradient(ellipse at 60% 38%, #28263e 80%, #10111a 100%);
      font-family: 'Brandon Grotesque', Arial, sans-serif;
      color: #f9e7bb;
      min-height: 100vh;
      overflow-x: hidden;
    }
    .centerbox {
      max-width: 700px;
      margin: 38px auto;
      text-align: center;
      background: rgba(22,19,34,0.87);
      border-radius: 32px;
      padding: 48px 24px 44px 24px;
      box-shadow: 0 18px 60px #0008;
      position: relative;
    }
    .game-title {
      font-family: 'CITZEN', 'Playfair Display', serif;
      letter-spacing: 0.07em;
      font-size: 2.35em;
      font-weight: 900;
      color: #fff4c0;
      margin-bottom: 7px;
      text-shadow: 0 3px 15px #fae49c77;
    }
    .tagline {
      font-family: 'Brandon Grotesque', Arial, sans-serif;
      font-size: 1.32em;
      color: #ffe799;
      margin-bottom: 33px;
      font-weight: 500;
      letter-spacing: 0.03em;
      text-shadow: 0 1px 12px #76510025;
    }
    .spinner-wrap {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      margin-bottom: 25px;
      position: relative;
      min-height: 375px;
    }
    .pointer {
      position: absolute;
      left: 50%; top: -48px;
      transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 22px solid transparent;
      border-right: 22px solid transparent;
      border-bottom: 42px solid #ffed9b;
      filter: drop-shadow(0 7px 7px #0006);
      z-index: 10;
    }
    .spinner-star {
      width: 330px; height: 330px;
      user-select: none;
      cursor: pointer;
      transition: filter 0.23s;
      filter: drop-shadow(0 10px 35px #7efcdb88) brightness(1.08);
      outline: none;
    }
    .spinner-star:hover { filter: drop-shadow(0 20px 65px #fa7) brightness(1.18);}
    .spin-btn, .mashup-btn {

      font-size: 1.32em;

      border-radius: 19px;

      font-weight: 700;

    .spin-btn:active, .mashup-btn:active {

      color: #321e05;
    }
    .result-area {
      margin: 38px 0 8px 0;
      font-size: 1.63em;
      color: #fff7e6;
      background: rgba(49,39,22,0.26);
      border-radius: 19px;
      padding: 32px 10px 26px 10px;
      box-shadow: 0 1px 12px #ffed9b18;
      min-height: 68px;
      font-family: 'Brandon Grotesque', Arial, sans-serif;
      font-weight: 600;
      line-height: 1.24em;
      letter-spacing: 0.01em;
    }
    .share-row { display:flex; gap:18px; justify-content:center; margin:14px 0 0 0;}
    .share-btn {
      font-family: 'Brandon Grotesque', Arial, sans-serif;
      border:none; border-radius:14px;
      padding:13px 29px;
      font-size:1.02em;
      font-weight:600;
      cursor:pointer;
      margin:0 1px;
      outline:none;
      background: #7ee2ff;
      color: #18444c;
      box-shadow: 0 2px 10px #7ee2ff44;
      transition: background 0.14s, color 0.14s;
    }
    .share-btn:hover { background:#f8ed84; color: #7e5e11; }

    /* Quantum Log */
    .quantum-log {
      margin-top: 22px;
      padding: 14px 16px 12px 16px;
      border-radius: 18px;
      background: rgba(7,6,11,0.8);
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);

      font-size: 0.9em;
    }

      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.8em;
      color: #ffe799;
      margin-bottom: 6px;
    }
    .quantum-log-line {
      margin-bottom: 4px;
    }
    .quantum-favs {
      margin: 4px 0 6px 0;
      padding-left: 18px;
      max-height: 120px;
      overflow-y: auto;
    }
    .quantum-favs li {
      margin-bottom: 2px;
    }
    .quantum-fav-empty {
      opacity: 0.7;
      list-style: none;
      padding-left: 0;
    }
    .quantum-log-actions {
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:4px;
    }
    .share-btn.small {
      padding:7px 16px;
      font-size:0.8em;
    }

      .spinner-star { width: 90vw; height: 90vw; max-width:330px; max-height:330px;}
      .pointer{ border-left:12px solid transparent; border-right:12px solid transparent; border-bottom:24px solid #ffed9b; top:-24px;}
      .result-area{font-size:1.07em;}

// ------- SVG Star Generation -------
function generateStar() {
  const centerX = 170, centerY = 170;
  const innerRadius = 54, outerRadius = 158;
  const group = document.getElementById('starGroup');
  group.innerHTML = '';

  for (let s = 0; s < SEGMENTS; s++) {
    const a1 = (Math.PI * 2 / SEGMENTS) * s - Math.PI/2;
    const a2 = (Math.PI * 2 / SEGMENTS) * (s + 1) - Math.PI/2;
    const p1 = [
      centerX + outerRadius * Math.cos(a1),
      centerY + outerRadius * Math.sin(a1)
    ];
    const p2 = [
      centerX + innerRadius * Math.cos(a1 + (a2-a1)/2),
      centerY + innerRadius * Math.sin(a1 + (a2-a1)/2)
    ];
    const p3 = [
      centerX + outerRadius * Math.cos(a2),
      centerY + outerRadius * Math.sin(a2)
    ];
    const d = `M${centerX},${centerY}
      L${p1[0]},${p1[1]}
      L${p2[0]},${p2[1]}
      L${p3[0]},${p3[1]}
      Z`;
    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
    path.setAttribute("d", d);
    path.setAttribute("fill", COLORS[s % COLORS.length]);
    path.setAttribute("stroke", "#fff");
    path.setAttribute("stroke-width", "2");
    path.setAttribute("style", "cursor:pointer;");
    group.appendChild(path);
  }
}
generateStar();

// ------- LocalStorage & State -------
const LS_KEY = 'spinspire_state_v1';

function getTodayDate() {
  const d = new Date();
  return d.toISOString().slice(0,10); // YYYY-MM-DD
}

function loadState() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch(e) {
    console.warn('Could not load SpinSpire state', e);
    return null;
  }
}

function saveState() {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify(appState));
  } catch(e) {
    console.warn('Could not save SpinSpire state', e);
  }
}

let appState = (function initState(){
  const today = getTodayDate();
  const saved = loadState();
  if (saved && saved.date === today) {
    return saved;
  }
  return {
    date: today,
    spinsToday: 0,
    favorites: [],
    lastPrompt: null  // { mode, primaryIndex, secondaryIndex, text }
  };
})();

// ------- DOM Refs -------
const promptArea = document.getElementById('promptArea');
const spinsTodayEl = document.getElementById('spinsToday');
const favoritesListEl = document.getElementById('favoritesList');

// ------- Quantum Log UI -------
function renderQuantumLog() {
  spinsTodayEl.textContent = appState.spinsToday || 0;

  favoritesListEl.innerHTML = '';
  if (!appState.favorites || appState.favorites.length === 0) {
    const li = document.createElement('li');
    li.className = 'quantum-fav-empty';
    li.textContent = 'No favorites yet.';
    favoritesListEl.appendChild(li);
    return;
  }
  appState.favorites.forEach(text => {
    const li = document.createElement('li');
    li.textContent = text;
    favoritesListEl.appendChild(li);
  });
}

function restorePromptFromState() {
  const lp = appState.lastPrompt;
  if (lp && typeof lp.text === 'string') {
    if (lp.mode === 'mashup' &&
        typeof lp.primaryIndex === 'number' &&
        typeof lp.secondaryIndex === 'number' &&
        creativePrompts[lp.primaryIndex] &&
        creativePrompts[lp.secondaryIndex]) {
      promptArea.innerHTML = `<b>${creativePrompts[lp.primaryIndex]}</b> <br>and<br><b>${creativePrompts[lp.secondaryIndex]}</b>`;
    } else {
      promptArea.textContent = lp.text;
    }
  }
  renderQuantumLog();
}

// ------- Segment → Prompt mapping -------
function promptIndexForSegment(segIndex) {
  const total = creativePrompts.length;
  if (!total) return 0;
  const bucketSize = Math.ceil(total / SEGMENTS);
  const start = segIndex * bucketSize;
  const end = Math.min(start + bucketSize, total);
  if (end <= start) {
    return Math.floor(Math.random() * total);
  }
  return start + Math.floor(Math.random() * (end - start));
}

// ------- Spinner Logic -------
let spinning = false;
let lastSegmentIndex = -1;

function spinWheel(mashup = false) {
  if (spinning) return;
  spinning = true;
  promptArea.textContent = "Spinning...";

  const spinCount = Math.floor(3 + Math.random() * 2);
  const seg = SEGMENTS;
  let target = Math.floor(Math.random() * seg);
  if (target === lastSegmentIndex) target = (target + 1) % seg;
  lastSegmentIndex = target;

  const angle = 360 * spinCount + 360/seg * (seg - target) - (360/seg)/2;
  const star = document.getElementById("spinnerStar");
  star.style.transition = "transform 2.1s cubic-bezier(.15,.85,.19,1)";
  star.style.transform = `rotate(${angle}deg)`;

  const promptIndex = promptIndexForSegment(target);

  setTimeout(() => {
    showPrompt(promptIndex, mashup);
    spinning = false;
    star.style.transition = "";
  }, 2100);
}

function showPrompt(index, mashup = false) {
  if (!creativePrompts.length) {
    promptArea.textContent = "No prompts available.";
    return;
  }

  let mode = mashup ? 'mashup' : 'single';
  let primaryIndex = index;
  let secondaryIndex = null;
  let text;

  if (mashup) {
    let i2 = primaryIndex;
    while (i2 === primaryIndex && creativePrompts.length > 1) {
      i2 = Math.floor(Math.random() * creativePrompts.length);
    }
    secondaryIndex = i2;
    const p1 = creativePrompts[primaryIndex] || '';
    const p2 = creativePrompts[secondaryIndex] || '';
    text = `${p1}\n\nand\n\n${p2}`;
    promptArea.innerHTML = `<b>${p1}</b> <br>and<br><b>${p2}</b>`;
  } else {
    const p = creativePrompts[primaryIndex] || creativePrompts[0];
    text = p;
    promptArea.textContent = p;
  }

  appState.spinsToday = (appState.spinsToday || 0) + 1;
  appState.lastPrompt = { mode, primaryIndex, secondaryIndex, text };
  saveState();
  renderQuantumLog();
}

// ------- Sharing -------
function copyPrompt() {
  const text = promptArea.innerText.trim();
  if (!text || text === "Spinning..." || text === "Click “Spin!” to get your prompt.") return;

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text)
      .then(() => {
        alert("Prompt copied! Paste and share anywhere.");
      })
      .catch(() => {
        alert("Copy failed in this browser. You can select and copy manually.");
      });
  } else {
    alert("Copy isn’t available here. Please select and copy the prompt manually.");
  }
}

function fbShare() {
  const text = promptArea.innerText.trim();
  if (!text || text === "Spinning..." || text === "Click “Spin!” to get your prompt.") return;
  const shareText = encodeURIComponent("My SpinSpire™ prompt: " + text + " #SpinSpire #ArtPrompt");
  window.open("https://www.facebook.com/sharer/sharer.php?u=https://myartgallery.online&quote=" + shareText, "_blank");
}

// ------- Favorites / Quantum Log actions -------
function addFavorite() {
  const lp = appState.lastPrompt;
  if (!lp || !lp.text) {
    alert("Spin first, then you can favorite a prompt.");
    return;
  }
  const text = lp.text;
  if (!appState.favorites) appState.favorites = [];
  if (appState.favorites.includes(text)) {
    alert("This prompt is already in today’s favorites.");
    return;
  }
  appState.favorites.push(text);
  if (appState.favorites.length > 10) {
    appState.favorites = appState.favorites.slice(-10);
  }
  saveState();
  renderQuantumLog();
}

function clearLog() {
  if (!confirm("Clear today’s spin log? This will reset the spin count and favorites for today.")) return;
  appState.spinsToday = 0;
  appState.favorites = [];
  saveState();
  renderQuantumLog();
}

// ------- Event Handlers -------
const spinBtn = document.getElementById('spinBtn');
const mashupBtn = document.getElementById('mashupBtn');
const star = document.getElementById('spinnerStar');
const copyBtn = document.getElementById('copyBtn');
const fbBtn = document.getElementById('fbBtn');
const favBtn = document.getElementById('favBtn');
const clearLogBtn = document.getElementById('clearLogBtn');

spinBtn.addEventListener('click', () => spinWheel(false));
mashupBtn.addEventListener('click', () => spinWheel(true));

star.addEventListener('click', () => spinWheel(false));
star.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' || e.key === ' ') {
    e.preventDefault();
    spinWheel(false);
  }
});

copyBtn.addEventListener('click', copyPrompt);
fbBtn.addEventListener('click', fbShare);
favBtn.addEventListener('click', addFavorite);
clearLogBtn.addEventListener('click', clearLog);

// ------- Initial Render from LocalStorage -------
restorePromptFromState();
