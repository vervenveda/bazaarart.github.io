let streak = Number(localStorage.getItem("kindStreak")) || 0;
let lastChecked = localStorage.getItem("kindLast") || "";
let completed = JSON.parse(localStorage.getItem("kindCompleted")||"[]");
let currentPrompt = "";

function getRandomPrompt() {
  let idx = Math.floor(Math.random()*KINDNESS_PROMPTS.length);
  let prompt = KINDNESS_PROMPTS[idx];
  // Avoid immediate repeats
  while (prompt === currentPrompt && KINDNESS_PROMPTS.length > 1) {
    idx = Math.floor(Math.random()*KINDNESS_PROMPTS.length);
    prompt = KINDNESS_PROMPTS[idx];
  }
  return prompt;
}

function showPrompt(prompt) {
  currentPrompt = prompt;
  document.getElementById("kindnessCard").innerHTML = prompt;
}

function updateStreak() {
  let msg = `Streak: <b>${streak}</b> acts completed`;
  if (streak >= 5 && streak < 10) msg += " ✨";
  if (streak >= 10) msg += " 🌟";
  document.getElementById("streakCard").innerHTML = msg;
}

function addToHistory(prompt) {
  if (!completed.includes(prompt)) completed.push(prompt);
  localStorage.setItem("kindCompleted", JSON.stringify(completed));
  renderHistory();
}
function renderHistory() {
  const list = document.getElementById("historyItems");
  list.innerHTML = "";
  completed.slice().reverse().forEach(item => {
    const li = document.createElement("li");
    li.textContent = item;
    list.appendChild(li);
  });
}

function sharePrompt() {
  const shareMsg = `I just completed a creative act of kindness: "${currentPrompt}" 🌟 Join me at MyArtGallery.online!`;
  if (navigator.share) {
    navigator.share({title: "Random Act of Kindness", text: shareMsg, url: location.href});
  } else {
    // Clipboard fallback
    navigator.clipboard.writeText(shareMsg).then(() => {
      alert("Prompt copied to clipboard! Paste to Facebook, Instagram, or anywhere you wish to share.");
    });
  }
}

document.getElementById("nextBtn").onclick = function() {
  showPrompt(getRandomPrompt());
};

document.getElementById("checkBtn").onclick = function() {
  if (!currentPrompt) return;
  if (!completed.includes(currentPrompt)) {
    streak += 1;
    localStorage.setItem("kindStreak", streak);
    addToHistory(currentPrompt);
    localStorage.setItem("kindLast", currentPrompt);
    updateStreak();
  }
  // Show a happy checkmark!
  document.getElementById("kindnessCard").innerHTML = `<span>${currentPrompt}</span> <span class="checked">✔️</span>`;
};

document.getElementById("shareBtn").onclick = sharePrompt;

let showHist = false;
document.getElementById("toggleHistory").onclick = function() {
  showHist = !showHist;
  document.getElementById("historyList").style.display = showHist ? "block" : "none";
  this.textContent = showHist ? "Hide Kindness History" : "Show Kindness History";
};

// Init
(function() {
  if (!currentPrompt) showPrompt(getRandomPrompt());
  updateStreak();
  renderHistory();
})();
